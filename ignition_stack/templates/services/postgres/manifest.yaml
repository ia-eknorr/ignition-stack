# PostgreSQL - the default Ignition SQL store / historian backend.
# Provides the sql-database capability Keycloak depends on.
name: postgres
kind: database
summary: PostgreSQL database, the default Ignition historian and SQL store
image: postgres:18.1
image_env: POSTGRES_IMAGE
network: backend
provides:
  - sql-database
  - postgres-compatible
requires: []
# DB credentials (DB_USER / DB_PASSWORD / DB_HOST) are emitted by the writer's
# shared database .env section, not here, so every database kind shares one
# credential vocabulary.
env: {}
# Ships a pre-seeded gateway database-connection (config.json + resource.json)
# plus the internal-secret-provider that holds its password, per the Phase-1
# matrix db-connection row (file-seedable-config: yes, file-seedable-secret: yes).
seeds_gateway_resources: true
# One database per stack (the per-kind ${POSTGRES_IMAGE} and shared
# ${DB_USER}/${DB_PASSWORD} env keys collide otherwise) and never on an Edge
# gateway: a leaf Edge node must not hold a SQL/historian connection. The schema
# edge invariant and the resolver's lowering both read placement.never_on_edge.
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
placement:
  never_on_edge: true
connection:
  # Internal port is always 5432; the DB_USER name doubles as the database name.
  in_network: "jdbc:postgresql://{id}:5432/{db_user}"
  # Postgres publishes no host port by default — the gateway connects in-network.
  host_port_env: ""
  credential_env:
    - DB_USER
    - DB_PASSWORD
post_setup: []

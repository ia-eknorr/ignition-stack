# MongoDB - document store. Used by automation/streaming demos that want a
# NoSQL backend. Not a SQL database, so it does not satisfy Keycloak.
name: mongo
kind: database
summary: MongoDB document store for NoSQL demos
image: mongo:7
image_env: MONGO_IMAGE
network: backend
provides:
  - document-store
requires: []
env: {}
seeds_gateway_resources: false
# One database per stack; never on an Edge gateway (see postgres manifest).
singleton: true
# issue #67: relax the singleton bound to attached instances, so a
# deliberately-unattached (flat) duplicate may sit alongside the wired one.
singleton_scope: attached
placement:
  never_on_edge: true
connection:
  in_network: "mongodb://{id}:27017"
  host_port_env: ""
  credential_env:
    - DB_USER
    - DB_PASSWORD
post_setup: []
